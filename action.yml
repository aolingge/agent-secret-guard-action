name: Agent Secret Guard
description: Scan AI agent, MCP, and local automation repos for risky secrets and permissions.
branding:
  icon: shield
  color: red
inputs:
  path:
    description: Path to scan.
    required: false
    default: .
  fail-on:
    description: "Lowest severity that should fail the action: low, medium, high, or critical."
    required: false
    default: high
  format:
    description: "Output format: text, json, or sarif."
    required: false
    default: text
  output:
    description: Optional file path to write the report to.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      run: npm install --global agent-secret-guard@0.2.3
    - shell: bash
      env:
        AGENT_SECRET_GUARD_PATH: ${{ inputs.path }}
        AGENT_SECRET_GUARD_FAIL_ON: ${{ inputs.fail-on }}
        AGENT_SECRET_GUARD_FORMAT: ${{ inputs.format }}
        AGENT_SECRET_GUARD_OUTPUT: ${{ inputs.output }}
      run: |
        args=(scan "$AGENT_SECRET_GUARD_PATH" --fail-on "$AGENT_SECRET_GUARD_FAIL_ON" --format "$AGENT_SECRET_GUARD_FORMAT")
        if [ -n "$AGENT_SECRET_GUARD_OUTPUT" ]; then
          args+=(--output "$AGENT_SECRET_GUARD_OUTPUT")
        fi
        agent-secret-guard "${args[@]}"
